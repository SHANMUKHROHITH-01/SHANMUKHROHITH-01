name: Generate GitArtWork

on:
  schedule:
           - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: jasineri/gitartwork@v1
        with:
          user_name: SHANMUKHROHITH-01

      - uses: jasineri/simple-push-action@v1
